name: 'DocGuard — CDD Compliance'
description: 'Audit, guard, and score your project for Canonical-Driven Development compliance.'
author: 'Ricardo Accioly'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  command:
    description: 'Command to run: audit, guard, score, diff, fix, sync'
    required: false
    default: 'guard'
  format:
    description: 'Output format: text or json'
    required: false
    default: 'text'
  fail-on-warning:
    description: 'Fail the action on warnings (not just errors)'
    required: false
    default: 'false'
  score-threshold:
    description: 'Minimum CDD score to pass (0-100). Only used with score command.'
    required: false
    default: '0'
  working-directory:
    description: 'Project directory to scan'
    required: false
    default: '.'
  node-version:
    description: 'Node.js version to use'
    required: false
    default: '20'
  # ---- fix / sync mode (auto-commit on PRs) ----
  auto-commit:
    description: 'When command=fix or sync: commit any mechanical fixes back to the PR branch. Requires permissions.contents=write on the calling workflow.'
    required: false
    default: 'false'
  commit-message:
    description: 'Commit message body when auto-commit applies fixes. Trailer co-author is appended automatically.'
    required: false
    default: 'docs: apply DocGuard mechanical fixes'
  comment-on-pr:
    description: 'When command=fix, guard, or sync: post a summary comment on the PR. Requires permissions.pull-requests=write.'
    required: false
    default: 'false'
  bot-name:
    description: 'Git author name for the auto-commit. Defaults to a clearly-marked bot identity.'
    required: false
    default: 'docguard-bot'
  bot-email:
    description: 'Git author email for the auto-commit.'
    required: false
    default: 'docguard-bot@users.noreply.github.com'

outputs:
  score:
    description: 'CDD maturity score (0-100)'
    value: ${{ steps.run.outputs.score }}
  grade:
    description: 'CDD grade (A+, A, B, C, D, F)'
    value: ${{ steps.run.outputs.grade }}
  result:
    description: 'Full JSON result from DocGuard'
    value: ${{ steps.run.outputs.result }}
  fixes-applied:
    description: 'For command=fix: number of mechanical fixes applied (0 = none, no commit was made)'
    value: ${{ steps.fix.outputs.fixes-applied }}
  changed-files:
    description: 'For command=fix or sync: newline-separated list of files modified by --write'
    value: ${{ steps.fix.outputs.changed-files }}
  committed:
    description: 'For auto-commit=true: "true" if a commit was pushed, "false" otherwise'
    value: ${{ steps.commit.outputs.committed }}

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install DocGuard
      shell: bash
      run: npm install -g docguard-cli@latest || npx docguard-cli --version

    - name: Run DocGuard
      id: run
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        # SECURITY: inputs are passed through the environment, never interpolated
        # into the script body. Splicing ${{ inputs.* }} directly into a run:
        # block lets a caller that maps untrusted data (an issue title, a PR
        # body, a fork-controlled value) into an input inject shell commands.
        # An env var's value is data — the shell does not re-evaluate it.
        INPUT_COMMAND: ${{ inputs.command }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_FAIL_ON_WARNING: ${{ inputs.fail-on-warning }}
        INPUT_SCORE_THRESHOLD: ${{ inputs.score-threshold }}
      run: |
        set +e

        # Determine command and flags
        CMD="$INPUT_COMMAND"
        FORMAT="$INPUT_FORMAT"
        FLAGS=""

        if [ "$FORMAT" = "json" ]; then
          FLAGS="$FLAGS --format json"
        fi

        # Run the command
        if [ "$CMD" = "score" ]; then
          RESULT=$(npx docguard-cli score $FLAGS 2>&1)
          EXIT_CODE=$?

          # Extract score from JSON output
          if [ "$FORMAT" = "json" ]; then
            echo "result=$RESULT" >> $GITHUB_OUTPUT
            SCORE=$(echo "$RESULT" | grep -o '"score":[0-9]*' | head -1 | cut -d: -f2)
            GRADE=$(echo "$RESULT" | grep -o '"grade":"[^"]*"' | head -1 | cut -d'"' -f4)
          else
            SCORE=$(echo "$RESULT" | grep -o '[0-9]*/100' | head -1 | cut -d/ -f1)
            GRADE=$(echo "$RESULT" | grep -o '([A-F+]*)' | head -1 | tr -d '()')
          fi

          echo "score=${SCORE:-0}" >> $GITHUB_OUTPUT
          echo "grade=${GRADE:-F}" >> $GITHUB_OUTPUT
          echo "$RESULT"

          # Check threshold
          THRESHOLD="$INPUT_SCORE_THRESHOLD"
          if [ "$THRESHOLD" -gt 0 ] 2>/dev/null && [ "${SCORE:-0}" -lt "$THRESHOLD" ]; then
            echo ""
            echo "::error::CDD score ${SCORE:-0} is below threshold ${THRESHOLD}"
            exit 1
          fi
        elif [ "$CMD" = "guard" ]; then
          npx docguard-cli guard $FLAGS
          EXIT_CODE=$?

          # Handle fail-on-warning
          if [ "$INPUT_FAIL_ON_WARNING" = "true" ] && [ "$EXIT_CODE" = "2" ]; then
            echo ""
            echo "::error::DocGuard guard found warnings (fail-on-warning is enabled)"
            exit 1
          fi

          # Exit code 2 = warnings only (not failure by default)
          if [ "$EXIT_CODE" = "2" ] && [ "$INPUT_FAIL_ON_WARNING" != "true" ]; then
            echo "::warning::DocGuard guard found warnings"
            exit 0
          fi

          exit $EXIT_CODE
        elif [ "$CMD" = "fix" ] || [ "$CMD" = "sync" ]; then
          # Handled by the fix step below — print marker and exit clean here so
          # the next step takes over with its own diff detection.
          echo "::group::DocGuard $CMD (write phase runs in the next step)"
          echo "delegating to 'Apply fixes' step"
          echo "::endgroup::"
          exit 0
        else
          # "$CMD" is quoted so it's a single argument to the CLI, never a shell
          # token — an unknown value just errors as an unknown command.
          npx docguard-cli "$CMD" $FLAGS
          EXIT_CODE=$?
          exit $EXIT_CODE
        fi

    - name: Apply fixes (fix/sync mode)
      id: fix
      if: inputs.command == 'fix' || inputs.command == 'sync'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        INPUT_COMMAND: ${{ inputs.command }}
      run: |
        set +e
        CMD="$INPUT_COMMAND"

        # Snapshot working-tree state before the write.
        BEFORE=$(git status --porcelain 2>/dev/null | sort)

        if [ "$CMD" = "fix" ]; then
          npx docguard-cli fix --write 2>&1 | tee docguard-fix-output.txt
          RC=${PIPESTATUS[0]}
        else
          npx docguard-cli sync --write 2>&1 | tee docguard-fix-output.txt
          RC=${PIPESTATUS[0]}
        fi

        AFTER=$(git status --porcelain 2>/dev/null | sort)

        # Files that changed during the write (new, modified, or deleted).
        # Filter out DocGuard's own side-effect paths — `ensureSkills` writes
        # to .agent/ / .specify/ / commands/ on first run, and we don't want
        # those committed as "fixes". Headless mode in the CLI already skips
        # ensureSkills, but we belt-and-brace it here for older CLIs and
        # for any future side-effect tree the CLI might introduce.
        CHANGED=$(diff <(echo "$BEFORE") <(echo "$AFTER") \
          | grep '^>' \
          | sed 's/^> //' \
          | awk '{print $2}' \
          | grep -vE '^(\.agent|\.specify|commands|\.docguard|\.wolf|\.claude)/' \
          | sort -u)
        COUNT=$(echo "$CHANGED" | grep -c . || true)

        echo "fixes-applied=${COUNT:-0}" >> $GITHUB_OUTPUT
        {
          echo "changed-files<<DOCGUARD_EOF"
          echo "$CHANGED"
          echo "DOCGUARD_EOF"
        } >> $GITHUB_OUTPUT

        echo ""
        echo "DocGuard $CMD applied ${COUNT:-0} change(s)."
        if [ "${COUNT:-0}" -gt 0 ]; then
          echo "$CHANGED" | sed 's/^/  • /'
        fi

        exit $RC

    - name: Commit and push fixes
      id: commit
      if: (inputs.command == 'fix' || inputs.command == 'sync') && inputs.auto-commit == 'true' && steps.fix.outputs.fixes-applied != '0'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        # SECURITY: all inputs and event context pass through the environment.
        # Notably HEAD_REF is a PR branch name, which is attacker-controllable
        # and a valid git branch may contain shell metacharacters ($(), `, ;) —
        # interpolating it into the script would be a command-injection vector.
        INPUT_COMMAND: ${{ inputs.command }}
        INPUT_BOT_NAME: ${{ inputs.bot-name }}
        INPUT_BOT_EMAIL: ${{ inputs.bot-email }}
        INPUT_COMMIT_MESSAGE: ${{ inputs.commit-message }}
        FIXES_APPLIED: ${{ steps.fix.outputs.fixes-applied }}
        EVENT_NAME: ${{ github.event_name }}
        HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
        REPOSITORY: ${{ github.repository }}
        HEAD_REF: ${{ github.event.pull_request.head.ref }}
        REF_NAME: ${{ github.ref_name }}
        ACTION_REF: ${{ github.action_ref || 'main' }}
      run: |
        set -e

        # Refuse to run on PRs from forks — pushing back is impossible.
        if [ "$EVENT_NAME" = "pull_request" ] && [ "$HEAD_REPO" != "$REPOSITORY" ]; then
          echo "::warning::Auto-commit skipped — PR is from a fork (head.repo != repository). The bot cannot push to fork branches."
          echo "committed=false" >> $GITHUB_OUTPUT
          exit 0
        fi

        git config user.name "$INPUT_BOT_NAME"
        git config user.email "$INPUT_BOT_EMAIL"

        # Use a clearly-bot-attributed commit so the PR author and reviewers can
        # tell at a glance this came from automation, not a human edit.
        git add -A
        git commit -m "$INPUT_COMMIT_MESSAGE" \
                   -m "Files: ${FIXES_APPLIED} touched by 'docguard ${INPUT_COMMAND} --write'." \
                   -m "Automated commit from raccioly/docguard@${ACTION_REF}." \
                   -m "Co-Authored-By: ${INPUT_BOT_NAME} <${INPUT_BOT_EMAIL}>"

        # Push to the PR head ref when triggered by pull_request, otherwise to the
        # current branch. Refs are passed as data via env vars (see note above).
        if [ "$EVENT_NAME" = "pull_request" ]; then
          git push origin "HEAD:${HEAD_REF}"
        else
          git push origin "HEAD:${REF_NAME}"
        fi

        echo "committed=true" >> $GITHUB_OUTPUT

    - name: Post Fix Summary to PR Comment
      if: (inputs.command == 'fix' || inputs.command == 'sync') && inputs.comment-on-pr == 'true' && github.event_name == 'pull_request'
      uses: actions/github-script@v9
      env:
        # SECURITY: read via process.env, not ${{ }} spliced into the JS source.
        # A value like '; maliciousJS; ' would otherwise break out of the string
        # literal and execute in the privileged github-script context.
        FIXES_APPLIED: ${{ steps.fix.outputs.fixes-applied }}
        CHANGED_FILES: ${{ steps.fix.outputs.changed-files }}
        COMMITTED: ${{ steps.commit.outputs.committed }}
        INPUT_COMMAND: ${{ inputs.command }}
      with:
        script: |
          const count = parseInt(process.env.FIXES_APPLIED || '0', 10);
          const changedRaw = (process.env.CHANGED_FILES || '').trim();
          const committed = process.env.COMMITTED === 'true';
          const cmd = process.env.INPUT_COMMAND || 'fix';
          const files = changedRaw ? changedRaw.split('\n').filter(Boolean) : [];

          let body;
          if (count === 0) {
            body = `## ✅ DocGuard \`${cmd}\` — no mechanical fixes needed\n\n` +
                   `Docs and code are already in sync for the deterministic fix types (version, count, endpoint removal, changelog stub).\n\n` +
                   `Prose rewrites (if any) still need an AI agent — run \`/docguard.fix\` from your editor.\n\n` +
                   `> *Automated by [DocGuard](https://github.com/raccioly/docguard)*`;
          } else {
            const list = files.slice(0, 25).map(f => `- \`${f}\``).join('\n');
            const extra = files.length > 25 ? `\n\n…and ${files.length - 25} more.` : '';
            const tail = committed
              ? `Pushed to \`${context.payload.pull_request.head.ref}\` as a single bot commit.`
              : `\`auto-commit\` was off — apply locally with \`npx docguard-cli ${cmd} --write\`.`;
            body = `## 🔧 DocGuard \`${cmd}\` — ${count} mechanical fix(es) applied\n\n` +
                   `${list}${extra}\n\n` +
                   `${tail}\n\n` +
                   `> *Automated by [DocGuard](https://github.com/raccioly/docguard)*`;
          }

          const { owner, repo } = context.repo;
          const issue_number = context.issue.number;
          const comments = await github.rest.issues.listComments({ owner, repo, issue_number });
          const existing = comments.data.find(c =>
            c.body.includes(`DocGuard \`${cmd}\``) && c.user.type === 'Bot'
          );
          if (existing) {
            await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
          } else {
            await github.rest.issues.createComment({ owner, repo, issue_number, body });
          }

    - name: Post Score to PR Comment
      if: inputs.command == 'score' && github.event_name == 'pull_request'
      uses: actions/github-script@v9
      env:
        SCORE: ${{ steps.run.outputs.score }}
        GRADE: ${{ steps.run.outputs.grade }}
      with:
        script: |
          const score = process.env.SCORE || '?';
          const grade = process.env.GRADE || '?';

          const emoji = parseInt(score) >= 80 ? '✅' : parseInt(score) >= 60 ? '⚠️' : '❌';
          const body = `## ${emoji} DocGuard CDD Score: ${score}/100 (${grade})

          | Category | Score |
          |----------|-------|
          | Run \`docguard score --format json\` for full breakdown | |

          > *Automated by [DocGuard](https://github.com/raccioly/docguard)*`;

          // Find existing comment
          const comments = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          const existing = comments.data.find(c =>
            c.body.includes('DocGuard CDD Score') && c.user.type === 'Bot'
          );

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }
