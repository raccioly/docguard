name: 'DocGuard — CDD Compliance'
description: 'Audit, guard, and score your project for Canonical-Driven Development compliance.'
author: 'Ricardo Accioly'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  command:
    description: 'Command to run: audit, guard, score, diff, fix, sync'
    required: false
    default: 'guard'
  format:
    description: 'Output format: text or json'
    required: false
    default: 'text'
  fail-on-warning:
    description: 'Fail the action on warnings (not just errors)'
    required: false
    default: 'false'
  score-threshold:
    description: 'Minimum CDD score to pass (0-100). Only used with score command.'
    required: false
    default: '0'
  working-directory:
    description: 'Project directory to scan'
    required: false
    default: '.'
  node-version:
    description: 'Node.js version to use'
    required: false
    default: '20'
  # ---- PR feedback (guard mode) ----
  annotations:
    description: 'When command=guard: emit inline annotations (::error/::warning) on the PR diff, one per finding, capped at 50.'
    required: false
    default: 'true'
  pr-comment:
    description: 'When command=guard: post a sticky guard-status + doc-impact comment on the PR. Only acts on pull_request events; requires permissions.pull-requests=write (degrades to a log warning without it). Distinct from comment-on-pr, which covers fix/sync summaries.'
    required: false
    default: 'true'
  # ---- fix / sync mode (auto-commit on PRs) ----
  auto-commit:
    description: 'When command=fix or sync: commit any mechanical fixes back to the PR branch. Requires permissions.contents=write on the calling workflow.'
    required: false
    default: 'false'
  commit-message:
    description: 'Commit message body when auto-commit applies fixes. Trailer co-author is appended automatically.'
    required: false
    default: 'docs: apply DocGuard mechanical fixes'
  comment-on-pr:
    description: 'When command=fix, guard, or sync: post a summary comment on the PR. Requires permissions.pull-requests=write.'
    required: false
    default: 'false'
  bot-name:
    description: 'Git author name for the auto-commit. Defaults to a clearly-marked bot identity.'
    required: false
    default: 'docguard-bot'
  bot-email:
    description: 'Git author email for the auto-commit.'
    required: false
    default: 'docguard-bot@users.noreply.github.com'

outputs:
  score:
    description: 'CDD maturity score (0-100)'
    value: ${{ steps.run.outputs.score }}
  grade:
    description: 'CDD grade (A+, A, B, C, D, F)'
    value: ${{ steps.run.outputs.grade }}
  result:
    description: 'Full JSON result from DocGuard'
    value: ${{ steps.run.outputs.result }}
  fixes-applied:
    description: 'For command=fix: number of mechanical fixes applied (0 = none, no commit was made)'
    value: ${{ steps.fix.outputs.fixes-applied }}
  changed-files:
    description: 'For command=fix or sync: newline-separated list of files modified by --write'
    value: ${{ steps.fix.outputs.changed-files }}
  committed:
    description: 'For auto-commit=true: "true" if a commit was pushed, "false" otherwise'
    value: ${{ steps.commit.outputs.committed }}

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install DocGuard
      shell: bash
      run: npm install -g docguard-cli@latest || npx docguard-cli --version

    - name: Run DocGuard
      id: run
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        # SECURITY: inputs are passed through the environment, never interpolated
        # into the script body. Splicing ${{ inputs.* }} directly into a run:
        # block lets a caller that maps untrusted data (an issue title, a PR
        # body, a fork-controlled value) into an input inject shell commands.
        # An env var's value is data — the shell does not re-evaluate it.
        INPUT_COMMAND: ${{ inputs.command }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_FAIL_ON_WARNING: ${{ inputs.fail-on-warning }}
        INPUT_SCORE_THRESHOLD: ${{ inputs.score-threshold }}
      run: |
        set +e

        # Determine command and flags
        CMD="$INPUT_COMMAND"
        FORMAT="$INPUT_FORMAT"
        FLAGS=""

        if [ "$FORMAT" = "json" ]; then
          FLAGS="$FLAGS --format json"
        fi

        # Run the command
        if [ "$CMD" = "score" ]; then
          RESULT=$(npx docguard-cli score $FLAGS 2>&1)
          EXIT_CODE=$?

          # Extract score from JSON output
          if [ "$FORMAT" = "json" ]; then
            echo "result=$RESULT" >> $GITHUB_OUTPUT
            SCORE=$(echo "$RESULT" | grep -o '"score":[0-9]*' | head -1 | cut -d: -f2)
            GRADE=$(echo "$RESULT" | grep -o '"grade":"[^"]*"' | head -1 | cut -d'"' -f4)
          else
            SCORE=$(echo "$RESULT" | grep -o '[0-9]*/100' | head -1 | cut -d/ -f1)
            GRADE=$(echo "$RESULT" | grep -o '([A-F+]*)' | head -1 | tr -d '()')
          fi

          echo "score=${SCORE:-0}" >> $GITHUB_OUTPUT
          echo "grade=${GRADE:-F}" >> $GITHUB_OUTPUT
          echo "$RESULT"

          # Check threshold
          THRESHOLD="$INPUT_SCORE_THRESHOLD"
          if [ "$THRESHOLD" -gt 0 ] 2>/dev/null && [ "${SCORE:-0}" -lt "$THRESHOLD" ]; then
            echo ""
            echo "::error::CDD score ${SCORE:-0} is below threshold ${THRESHOLD}"
            exit 1
          fi
        elif [ "$CMD" = "guard" ]; then
          npx docguard-cli guard $FLAGS
          EXIT_CODE=$?

          # Handle fail-on-warning
          if [ "$INPUT_FAIL_ON_WARNING" = "true" ] && [ "$EXIT_CODE" = "2" ]; then
            echo ""
            echo "::error::DocGuard guard found warnings (fail-on-warning is enabled)"
            exit 1
          fi

          # Exit code 2 = warnings only (not failure by default)
          if [ "$EXIT_CODE" = "2" ] && [ "$INPUT_FAIL_ON_WARNING" != "true" ]; then
            echo "::warning::DocGuard guard found warnings"
            exit 0
          fi

          exit $EXIT_CODE
        elif [ "$CMD" = "fix" ] || [ "$CMD" = "sync" ]; then
          # Handled by the fix step below — print marker and exit clean here so
          # the next step takes over with its own diff detection.
          echo "::group::DocGuard $CMD (write phase runs in the next step)"
          echo "delegating to 'Apply fixes' step"
          echo "::endgroup::"
          exit 0
        else
          # "$CMD" is quoted so it's a single argument to the CLI, never a shell
          # token — an unknown value just errors as an unknown command.
          npx docguard-cli "$CMD" $FLAGS
          EXIT_CODE=$?
          exit $EXIT_CODE
        fi

    - name: Capture guard findings (annotations/comment data)
      # always(): guard exits 1 on errors, failing the step above — which is
      # exactly when annotations and the PR comment matter most. The capture
      # (and the two consumers below) must still run; the action's own exit
      # code is untouched because the failed 'Run DocGuard' step already
      # determines it.
      if: always() && inputs.command == 'guard' && (inputs.annotations == 'true' || (inputs.pr-comment == 'true' && github.event_name == 'pull_request'))
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        # SECURITY: same rule as every step in this file — event context is
        # data, never script text. BASE_REF is a branch name, which a fork PR
        # controls and may contain shell metacharacters; it is only ever
        # expanded quoted.
        INPUT_PR_COMMENT: ${{ inputs.pr-comment }}
        EVENT_NAME: ${{ github.event_name }}
        BASE_REF: ${{ github.base_ref }}
      run: |
        set +e

        # Re-run guard in JSON mode into a temp file for the two steps below.
        # The 'Run DocGuard' step stays the sole source of the score/grade/
        # result outputs and the pass/fail signal — this capture never alters
        # it. guard exits 1 (errors) / 2 (warnings) precisely when there ARE
        # findings to report, so the non-zero exit must not fail this step.
        npx docguard-cli guard --format json > "$RUNNER_TEMP/docguard.json" || true

        # Doc impact vs the PR base, for the sticky comment. actions/checkout
        # defaults to a shallow single-commit clone where the base ref does not
        # exist locally — fetch it best-effort (a depth-1 fetch is enough: the
        # CLI runs a two-dot 'git diff <ref> HEAD', no merge-base needed) and
        # degrade to an empty file, which makes the comment step omit the
        # impact section instead of failing the whole action.
        : > "$RUNNER_TEMP/docguard-impact.json"
        if [ "$EVENT_NAME" = "pull_request" ] && [ "$INPUT_PR_COMMENT" = "true" ] && [ -n "$BASE_REF" ]; then
          git fetch --no-tags --depth=1 origin "$BASE_REF" >/dev/null 2>&1 || true
          npx docguard-cli diff --since "origin/$BASE_REF" --format json \
            > "$RUNNER_TEMP/docguard-impact.json" 2>/dev/null || true
        fi

        exit 0

    - name: Annotate findings on the PR diff
      if: always() && inputs.command == 'guard' && inputs.annotations == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        # Transform the captured findings into GitHub workflow commands, which
        # the runner renders as inline annotations on the diff. jq is not
        # guaranteed on every runner but Node is (DocGuard itself needs it),
        # so the JSON→commands transform is an inline node script. It only
        # reads the temp file — guard is never re-run here.
        if [ ! -s "$RUNNER_TEMP/docguard.json" ]; then
          echo "No captured guard JSON — skipping annotations."
          exit 0
        fi

        # The script deliberately contains no single quotes so it can live
        # inside this single-quoted bash argument; all dynamic values come
        # from the temp file and process.env — no expression interpolation.
        node -e '
          const fs = require("fs");
          const path = require("path");
          let data = null;
          try { data = JSON.parse(fs.readFileSync(process.env.RUNNER_TEMP + "/docguard.json", "utf8")); } catch {}
          const findings = data && Array.isArray(data.findings) ? data.findings : [];
          // Workflow-command escaping: % first (it is the escape character
          // itself), then CR/LF — a multi-line message must never smuggle in
          // a second ::command. Property values additionally escape the
          // delimiter characters , and : per the annotation rules.
          const esc = (s) => String(s).replace(/%/g, "%25").replace(/\r/g, "%0D").replace(/\n/g, "%0A");
          const escProp = (s) => esc(s).replace(/:/g, "%3A").replace(/,/g, "%2C");
          // file= paths must be workspace-relative, but finding locations are
          // relative to working-directory (possibly a subdir) — rebase them.
          const ws = process.env.GITHUB_WORKSPACE || process.cwd();
          const CAP = 50;
          let emitted = 0;
          for (const f of findings) {
            if (emitted === CAP) break;
            const level = f.severity === "error" ? "error" : "warning";
            let props = "title=" + escProp("DocGuard " + (f.code || "finding"));
            if (f.location) {
              const m = String(f.location).match(/^(.+?):(\d+)$/);
              let file = m ? m[1] : String(f.location);
              const rel = path.relative(ws, path.resolve(file)).split(path.sep).join("/");
              if (rel && !rel.startsWith("..")) file = rel;
              props = "file=" + escProp(file) + (m ? ",line=" + m[2] : "") + "," + props;
            }
            console.log("::" + level + " " + props + "::" + esc(f.message || ""));
            emitted++;
          }
          if (findings.length > CAP) {
            console.log("::notice title=DocGuard::" + (findings.length - CAP) + " finding(s) not annotated (cap is " + CAP + "). Run npx docguard-cli guard locally for the full list.");
          }
        '

    - name: Post Guard Summary to PR Comment
      if: always() && inputs.command == 'guard' && inputs.pr-comment == 'true' && github.event_name == 'pull_request'
      uses: actions/github-script@v9
      with:
        script: |
          // SECURITY: nothing dynamic is expression-interpolated into this
          // script body. All variable content is read from the RUNNER_TEMP
          // capture files and process.env, matching the steps above.
          const fs = require('fs');
          const path = require('path');

          const readJson = (p) => {
            try {
              const raw = fs.readFileSync(p, 'utf8');
              return raw.trim() ? JSON.parse(raw) : null;
            } catch { return null; }
          };

          const tmp = process.env.RUNNER_TEMP;
          const guard = readJson(path.join(tmp, 'docguard.json'));
          const impact = readJson(path.join(tmp, 'docguard-impact.json'));

          // Markdown-table cell sanitizer — findings text is repo content and
          // may contain pipes/newlines that would break the table layout.
          const cell = (s) => String(s ?? '').replace(/\|/g, '\\|').replace(/\r?\n/g, ' ').slice(0, 200);

          // Hidden marker = the sticky-comment identity. Re-runs find and
          // update this comment in place instead of stacking new ones.
          const marker = '<!-- docguard-action-comment -->';
          const lines = [marker, ''];

          if (guard) {
            const emoji = guard.status === 'PASS' ? '✅' : guard.status === 'WARN' ? '⚠️' : '❌';
            lines.push(`## ${emoji} DocGuard Guard — ${cell(guard.status)}`);
            lines.push('');
            lines.push(`**${guard.passed}/${guard.total} checks passed** · ${guard.errors} error(s), ${guard.warnings} warning(s)`);
            const findings = Array.isArray(guard.findings) ? guard.findings : [];
            if (findings.length > 0) {
              const top = findings.slice(0, 10);
              lines.push('');
              lines.push(`### Findings (top ${top.length} of ${findings.length})`);
              lines.push('');
              lines.push('| Code | Severity | Location | Message |');
              lines.push('|------|----------|----------|---------|');
              for (const f of top) {
                lines.push(`| \`${cell(f.code || '—')}\` | ${cell(f.severity)} | ${f.location ? '`' + cell(f.location) + '`' : '—'} | ${cell(f.message)} |`);
              }
              if (findings.length > top.length) {
                lines.push('');
                lines.push(`…and ${findings.length - top.length} more — run \`npx docguard-cli guard\` locally for the full list.`);
              }
            }
          } else {
            lines.push('## 🛡️ DocGuard Guard');
            lines.push('');
            lines.push('_Guard results were not captured for this run._');
          }

          // Doc-impact section — omitted entirely when the diff could not run
          // (shallow clone, missing base ref) or when no code files changed.
          if (impact && Array.isArray(impact.affectedDocs)) {
            const changed = Array.isArray(impact.changedFiles) ? impact.changedFiles : [];
            if (changed.length > 0) {
              lines.push('');
              lines.push(`### 📄 Doc impact (vs \`${cell(impact.since || 'base')}\`)`);
              lines.push('');
              if (impact.affectedDocs.length > 0) {
                lines.push(`${changed.length} changed code file(s) are referenced by:`);
                for (const d of impact.affectedDocs.slice(0, 10)) {
                  lines.push(`- **${cell(d.doc)}** — ${(d.files || []).length} changed file(s)`);
                }
                if (impact.affectedDocs.length > 10) {
                  lines.push(`- …and ${impact.affectedDocs.length - 10} more doc(s)`);
                }
                lines.push('');
                lines.push('Review these canonical docs — they reference code this PR touches.');
              } else {
                lines.push(`${changed.length} changed code file(s), none referenced by any canonical doc — the change may be undocumented.`);
              }
            }
          }

          const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
          lines.push('');
          lines.push('---');
          lines.push(`[View run](${runUrl}) · *Automated by [DocGuard](https://github.com/raccioly/docguard)*`);

          const body = lines.join('\n');
          const { owner, repo } = context.repo;
          const issue_number = context.issue.number;

          try {
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.data.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
          } catch (e) {
            // Fork PRs get a read-only GITHUB_TOKEN, and callers may not grant
            // pull-requests: write — degrade to a log warning rather than
            // failing a run whose guard verdict is already decided.
            core.warning(`DocGuard could not post the PR comment: ${e.message}`);
          }

    - name: Apply fixes (fix/sync mode)
      id: fix
      if: inputs.command == 'fix' || inputs.command == 'sync'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        INPUT_COMMAND: ${{ inputs.command }}
      run: |
        set +e
        CMD="$INPUT_COMMAND"

        # Snapshot working-tree state before the write.
        BEFORE=$(git status --porcelain 2>/dev/null | sort)

        if [ "$CMD" = "fix" ]; then
          npx docguard-cli fix --write 2>&1 | tee docguard-fix-output.txt
          RC=${PIPESTATUS[0]}
        else
          npx docguard-cli sync --write 2>&1 | tee docguard-fix-output.txt
          RC=${PIPESTATUS[0]}
        fi

        AFTER=$(git status --porcelain 2>/dev/null | sort)

        # Files that changed during the write (new, modified, or deleted).
        # Filter out DocGuard's own side-effect paths — `ensureSkills` writes
        # to .agent/ / .specify/ / commands/ on first run, and we don't want
        # those committed as "fixes". Headless mode in the CLI already skips
        # ensureSkills, but we belt-and-brace it here for older CLIs and
        # for any future side-effect tree the CLI might introduce.
        CHANGED=$(diff <(echo "$BEFORE") <(echo "$AFTER") \
          | grep '^>' \
          | sed 's/^> //' \
          | awk '{print $2}' \
          | grep -vE '^(\.agent|\.specify|commands|\.docguard|\.wolf|\.claude)/' \
          | sort -u)
        COUNT=$(echo "$CHANGED" | grep -c . || true)

        echo "fixes-applied=${COUNT:-0}" >> $GITHUB_OUTPUT
        {
          echo "changed-files<<DOCGUARD_EOF"
          echo "$CHANGED"
          echo "DOCGUARD_EOF"
        } >> $GITHUB_OUTPUT

        echo ""
        echo "DocGuard $CMD applied ${COUNT:-0} change(s)."
        if [ "${COUNT:-0}" -gt 0 ]; then
          echo "$CHANGED" | sed 's/^/  • /'
        fi

        exit $RC

    - name: Commit and push fixes
      id: commit
      if: (inputs.command == 'fix' || inputs.command == 'sync') && inputs.auto-commit == 'true' && steps.fix.outputs.fixes-applied != '0'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        # SECURITY: all inputs and event context pass through the environment.
        # Notably HEAD_REF is a PR branch name, which is attacker-controllable
        # and a valid git branch may contain shell metacharacters ($(), `, ;) —
        # interpolating it into the script would be a command-injection vector.
        INPUT_COMMAND: ${{ inputs.command }}
        INPUT_BOT_NAME: ${{ inputs.bot-name }}
        INPUT_BOT_EMAIL: ${{ inputs.bot-email }}
        INPUT_COMMIT_MESSAGE: ${{ inputs.commit-message }}
        FIXES_APPLIED: ${{ steps.fix.outputs.fixes-applied }}
        EVENT_NAME: ${{ github.event_name }}
        HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
        REPOSITORY: ${{ github.repository }}
        HEAD_REF: ${{ github.event.pull_request.head.ref }}
        REF_NAME: ${{ github.ref_name }}
        ACTION_REF: ${{ github.action_ref || 'main' }}
      run: |
        set -e

        # Refuse to run on PRs from forks — pushing back is impossible.
        if [ "$EVENT_NAME" = "pull_request" ] && [ "$HEAD_REPO" != "$REPOSITORY" ]; then
          echo "::warning::Auto-commit skipped — PR is from a fork (head.repo != repository). The bot cannot push to fork branches."
          echo "committed=false" >> $GITHUB_OUTPUT
          exit 0
        fi

        git config user.name "$INPUT_BOT_NAME"
        git config user.email "$INPUT_BOT_EMAIL"

        # Use a clearly-bot-attributed commit so the PR author and reviewers can
        # tell at a glance this came from automation, not a human edit.
        git add -A
        git commit -m "$INPUT_COMMIT_MESSAGE" \
                   -m "Files: ${FIXES_APPLIED} touched by 'docguard ${INPUT_COMMAND} --write'." \
                   -m "Automated commit from raccioly/docguard@${ACTION_REF}." \
                   -m "Co-Authored-By: ${INPUT_BOT_NAME} <${INPUT_BOT_EMAIL}>"

        # Push to the PR head ref when triggered by pull_request, otherwise to the
        # current branch. Refs are passed as data via env vars (see note above).
        if [ "$EVENT_NAME" = "pull_request" ]; then
          git push origin "HEAD:${HEAD_REF}"
        else
          git push origin "HEAD:${REF_NAME}"
        fi

        echo "committed=true" >> $GITHUB_OUTPUT

    - name: Post Fix Summary to PR Comment
      if: (inputs.command == 'fix' || inputs.command == 'sync') && inputs.comment-on-pr == 'true' && github.event_name == 'pull_request'
      uses: actions/github-script@v9
      env:
        # SECURITY: read via process.env, not ${{ }} spliced into the JS source.
        # A value like '; maliciousJS; ' would otherwise break out of the string
        # literal and execute in the privileged github-script context.
        FIXES_APPLIED: ${{ steps.fix.outputs.fixes-applied }}
        CHANGED_FILES: ${{ steps.fix.outputs.changed-files }}
        COMMITTED: ${{ steps.commit.outputs.committed }}
        INPUT_COMMAND: ${{ inputs.command }}
      with:
        script: |
          const count = parseInt(process.env.FIXES_APPLIED || '0', 10);
          const changedRaw = (process.env.CHANGED_FILES || '').trim();
          const committed = process.env.COMMITTED === 'true';
          const cmd = process.env.INPUT_COMMAND || 'fix';
          const files = changedRaw ? changedRaw.split('\n').filter(Boolean) : [];

          let body;
          if (count === 0) {
            body = `## ✅ DocGuard \`${cmd}\` — no mechanical fixes needed\n\n` +
                   `Docs and code are already in sync for the deterministic fix types (version, count, endpoint removal, changelog stub).\n\n` +
                   `Prose rewrites (if any) still need an AI agent — run \`/docguard.fix\` from your editor.\n\n` +
                   `> *Automated by [DocGuard](https://github.com/raccioly/docguard)*`;
          } else {
            const list = files.slice(0, 25).map(f => `- \`${f}\``).join('\n');
            const extra = files.length > 25 ? `\n\n…and ${files.length - 25} more.` : '';
            const tail = committed
              ? `Pushed to \`${context.payload.pull_request.head.ref}\` as a single bot commit.`
              : `\`auto-commit\` was off — apply locally with \`npx docguard-cli ${cmd} --write\`.`;
            body = `## 🔧 DocGuard \`${cmd}\` — ${count} mechanical fix(es) applied\n\n` +
                   `${list}${extra}\n\n` +
                   `${tail}\n\n` +
                   `> *Automated by [DocGuard](https://github.com/raccioly/docguard)*`;
          }

          const { owner, repo } = context.repo;
          const issue_number = context.issue.number;
          const comments = await github.rest.issues.listComments({ owner, repo, issue_number });
          const existing = comments.data.find(c =>
            c.body.includes(`DocGuard \`${cmd}\``) && c.user.type === 'Bot'
          );
          if (existing) {
            await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
          } else {
            await github.rest.issues.createComment({ owner, repo, issue_number, body });
          }

    - name: Post Score to PR Comment
      if: inputs.command == 'score' && github.event_name == 'pull_request'
      uses: actions/github-script@v9
      env:
        SCORE: ${{ steps.run.outputs.score }}
        GRADE: ${{ steps.run.outputs.grade }}
      with:
        script: |
          const score = process.env.SCORE || '?';
          const grade = process.env.GRADE || '?';

          const emoji = parseInt(score) >= 80 ? '✅' : parseInt(score) >= 60 ? '⚠️' : '❌';
          const body = `## ${emoji} DocGuard CDD Score: ${score}/100 (${grade})

          | Category | Score |
          |----------|-------|
          | Run \`docguard score --format json\` for full breakdown | |

          > *Automated by [DocGuard](https://github.com/raccioly/docguard)*`;

          // Find existing comment
          const comments = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          const existing = comments.data.find(c =>
            c.body.includes('DocGuard CDD Score') && c.user.type === 'Bot'
          );

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }
