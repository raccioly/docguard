name: Jules PR Triage

# Auto-triage PRs opened by the Google Jules agents (Sentinel/Bolt/Palette).
# Keeps Jules ON (it stays useful for genuinely-new work) while automatically
# clearing the duplicate/already-resolved noise it tends to produce, and giving
# it per-PR feedback (a comment mentioning @jules) so it learns.
#
# SECURITY: uses pull_request_target (needs write to comment/close/label on the
# PR), but reads only PR METADATA (title, author) via the API and NEVER checks
# out or runs the PR's code — so the elevated token is never exposed to
# PR-controlled content. (Matches the AGENTS.md CI rule.)

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  triage:
    # Only act on the Jules bot's PRs; everything else is untouched.
    if: github.event.pull_request.user.login == 'google-labs-jules[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Triage the Jules PR
        uses: actions/github-script@v9
        with:
          script: |
            const pr = context.payload.pull_request;
            const num = pr.number;
            const title = pr.title || '';
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Known-noise classes for THIS repo (see .jules/*.md RESOLVED markers).
            const NOISE = [
              /command injection|exec(File)?Sync/i,                                   // Sentinel — fixed v0.21.1 + #296
              /performance|optimi[sz]e|precompute|pre-?compile|O\(N|single-pass|\bset\b.*comparison|tolowercase|basenames?/i, // Bolt — applied + refactored
              /no (web )?ui|no changes? (needed|required)|no ux|no-op/i,               // Palette — no UI in this repo
            ];
            const isNoise = NOISE.some((re) => re.test(title));

            // Duplicate detection: another OPEN Jules PR with an equivalent title.
            const norm = (s) => (s || '')
              .toLowerCase()
              .replace(/[^a-z0-9]+/g, ' ')
              .replace(/\b(sentinel|bolt|palette|critical|high|medium|low|fix|the|a|an|via|in|of|for|to|and)\b/g, ' ')
              .replace(/\s+/g, ' ')
              .trim();
            const mine = norm(title);
            const { data: open } = await github.rest.pulls.list({ owner, repo, state: 'open', per_page: 100 });
            const dup = mine && open.find((p) => p.number !== num && norm(p.title) === mine);

            const addLabel = async (name) => {
              try {
                await github.rest.issues.addLabels({ owner, repo, issue_number: num, labels: [name] });
              } catch (e) { core.info(`label "${name}" skipped: ${e.message}`); }
            };

            if (isNoise || dup) {
              const reason = dup
                ? `a duplicate of #${dup.number}`
                : 'a class already resolved or not applicable in this repo';
              await github.rest.issues.createComment({
                owner, repo, issue_number: num,
                body:
                  `🤖 **Auto-triaged as stale** — ${reason}.\n\n` +
                  `@jules please stop opening PRs for this topic: it is covered by the RESOLVED markers in \`.jules/sentinel.md\` / \`.jules/bolt.md\` / \`.jules/palette.md\` and the **Automated agents** rule in \`AGENTS.md\` (search open **and** closed PRs first; never duplicate; only open a new PR for a genuinely-new finding with evidence — an exploit/failing test for security, or a >20% real-workload benchmark for performance). Closing to keep the queue clean.`,
              });
              await addLabel('jules-autoclosed');
              await github.rest.pulls.update({ owner, repo, pull_number: num, state: 'closed' });
              core.notice(`Closed #${num} (${reason}).`);
            } else {
              await addLabel('jules-review');
              await github.rest.issues.createComment({
                owner, repo, issue_number: num,
                body:
                  `🔎 **Flagged for human review** — this looks like a *new, non-duplicate* change from @jules. ` +
                  `A maintainer should verify it against \`docguard guard\` + the test suite before merge.`,
              });
              core.notice(`#${num} flagged for human review.`);
            }
