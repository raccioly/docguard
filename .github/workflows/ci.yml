name: DocGuard CI

on:
  workflow_dispatch: # Manual recovery for admin-bypass pushes that don't auto-trigger
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 24 ships npm 11 — keep it in the matrix so `npm ci` exercises the newer
        # npm that older Nodes (18/20/22 → npm 10) do NOT. This is what catches
        # config/install incompatibilities that npm 10 silently accepts but npm 11
        # treats as fatal (e.g. bug-198: `.npmrc` min-release-age broke the Glama
        # build on npm 11 while all local/CI installs passed). Do not drop 24.
        node-version: [18, 20, 22, 24]

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Full git history for freshness validator

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      # ── Install the one runtime dependency (@babel/parser) from the lockfile.
      #    Required: without it the AST-tier tests run with Babel absent. ──
      - name: Install dependencies
        run: npm ci

      # ── Syntax-check EVERY CLI source, not just the files the entry point
      #    eagerly imports (a lazily/dynamically loaded module's syntax error
      #    would otherwise slip through). This is the lint gate that would have
      #    caught the VS Code extension shipping with a parse error. ──
      - name: Syntax-check all CLI sources
        run: find cli -name '*.mjs' -print0 | xargs -0 -n1 node --check

      # ── Python wrapper import smoke (PyPI distribution surface) ──
      - name: Python wrapper imports
        run: python3 -c "import docguard_cli.wrapper; print('docguard_cli.wrapper OK')"

      # ── Automated Test Suite ──
      - name: Run Tests
        run: npm test

      # ── Self-validation (dogfooding) ──
      - name: CLI Version
        run: node cli/docguard.mjs --version

      - name: Guard (self-check)
        run: |
          # Exit 0 = pass, Exit 1 = errors (fail CI), Exit 2 = warnings only (allow)
          node cli/docguard.mjs guard || [ $? -eq 2 ]

      - name: Score
        run: node cli/docguard.mjs score

      - name: Score JSON
        run: node cli/docguard.mjs score --format json

      - name: Diff
        run: node cli/docguard.mjs diff

      - name: Badge
        run: node cli/docguard.mjs badge

      - name: Diagnose
        run: node cli/docguard.mjs diagnose

      # ── v0.33 surfaces — dogfood every new command shape ──
      - name: CI gate (self, records history)
        run: node cli/docguard.mjs ci || [ $? -eq 2 ]

      - name: Score trend (reads history from the ci step)
        run: node cli/docguard.mjs score --trend

      - name: Compliance report (markdown + json + integrity determinism)
        run: |
          node cli/docguard.mjs report > /tmp/report.md
          head -5 /tmp/report.md
          node cli/docguard.mjs report --format json | python3 -c "import json,sys; d=json.load(sys.stdin); assert d['integrity'].startswith('sha256:'), d; print('report json OK', d['integrity'][:20])"

      - name: Guard JUnit output is valid XML
        run: |
          node cli/docguard.mjs guard --format junit > /tmp/guard-junit.xml || [ $? -eq 2 ]
          python3 -c "import xml.etree.ElementTree as ET; r=ET.parse('/tmp/guard-junit.xml').getroot(); print('junit OK:', r.attrib)"

      - name: Baseline roundtrip (freeze → pass → restore)
        run: |
          mkdir -p /tmp/docguard-baseline && cd /tmp/docguard-baseline
          printf '{"projectName":"bl-ci","profile":"standard"}' > .docguard.json
          mkdir -p docs-canonical && echo "# Architecture" > docs-canonical/ARCHITECTURE.md
          node $GITHUB_WORKSPACE/cli/docguard.mjs guard --update-baseline
          node $GITHUB_WORKSPACE/cli/docguard.mjs guard   # must exit 0 now
          node $GITHUB_WORKSPACE/cli/docguard.mjs guard --no-baseline || [ $? -ne 0 ]

      # ── Cross-project tests ──
      - name: Init in temp dir
        run: |
          mkdir -p /tmp/docguard-test
          node cli/docguard.mjs init --dir /tmp/docguard-test --force

      - name: Guard after init (exit 2 = warnings OK for empty projects)
        run: |
          node cli/docguard.mjs guard --dir /tmp/docguard-test || [ $? -eq 2 ]

      - name: Generate in empty dir
        run: |
          mkdir -p /tmp/docguard-gen
          node cli/docguard.mjs generate --dir /tmp/docguard-gen

      - name: Generate --force
        run: node cli/docguard.mjs generate --dir /tmp/docguard-gen --force

      - name: Agents
        run: node cli/docguard.mjs agents --dir /tmp/docguard-test

      - name: Hooks --list
        run: node cli/docguard.mjs hooks --list

  # ── npm publish dry-run on tags ──
  publish-check:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
      - name: Publish dry-run
        run: npm publish --dry-run
