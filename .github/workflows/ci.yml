name: SpecGuard CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      # Test help
      - name: CLI Help
        run: node cli/specguard.mjs --help

      # Test version
      - name: CLI Version
        run: node cli/specguard.mjs --version

      # Test audit
      - name: Audit (before init)
        run: node cli/specguard.mjs audit

      # Test score (before init)
      - name: Score (before init)
        run: node cli/specguard.mjs score

      # Test score JSON output
      - name: Score JSON
        run: node cli/specguard.mjs score --format json

      # Test init
      - name: Init CDD docs
        run: |
          mkdir -p /tmp/specguard-test
          node cli/specguard.mjs init --dir /tmp/specguard-test

      # Test audit after init
      - name: Audit (after init)
        run: node cli/specguard.mjs audit --dir /tmp/specguard-test

      # Test score after init
      - name: Score (after init)
        run: node cli/specguard.mjs score --dir /tmp/specguard-test

      # Test guard after init
      - name: Guard (after init)
        run: node cli/specguard.mjs guard --dir /tmp/specguard-test || true

      # Test diff
      - name: Diff
        run: node cli/specguard.mjs diff --dir /tmp/specguard-test

      # Test generate
      - name: Generate (empty project)
        run: |
          mkdir -p /tmp/specguard-gen
          node cli/specguard.mjs generate --dir /tmp/specguard-gen

      # Test generate --force
      - name: Generate --force
        run: node cli/specguard.mjs generate --dir /tmp/specguard-gen --force

      # Test agents
      - name: Agents
        run: node cli/specguard.mjs agents --dir /tmp/specguard-test
