name: SpecGuard CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      
      - name: Verify CLI loads
        run: node cli/specguard.mjs --version
      
      - name: Run help
        run: node cli/specguard.mjs --help
      
      - name: Run audit (on self)
        run: node cli/specguard.mjs audit

      - name: Test init in temp directory
        run: |
          mkdir -p /tmp/specguard-test
          node cli/specguard.mjs init --dir /tmp/specguard-test
          node cli/specguard.mjs audit --dir /tmp/specguard-test
          ls -la /tmp/specguard-test/docs-canonical/
