name: DocGuard CI

on:
  workflow_dispatch: # Manual recovery for admin-bypass pushes that don't auto-trigger
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Full git history for freshness validator

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      # ── Install the one runtime dependency (@babel/parser) from the lockfile.
      #    Required: without it the AST-tier tests run with Babel absent. ──
      - name: Install dependencies
        run: npm ci

      # ── Syntax-check EVERY CLI source, not just the files the entry point
      #    eagerly imports (a lazily/dynamically loaded module's syntax error
      #    would otherwise slip through). This is the lint gate that would have
      #    caught the VS Code extension shipping with a parse error. ──
      - name: Syntax-check all CLI sources
        run: find cli -name '*.mjs' -print0 | xargs -0 -n1 node --check

      # ── Python wrapper import smoke (PyPI distribution surface) ──
      - name: Python wrapper imports
        run: python3 -c "import docguard_cli.wrapper; print('docguard_cli.wrapper OK')"

      # ── Automated Test Suite ──
      - name: Run Tests
        run: npm test

      # ── Self-validation (dogfooding) ──
      - name: CLI Version
        run: node cli/docguard.mjs --version

      - name: Guard (self-check)
        run: |
          # Exit 0 = pass, Exit 1 = errors (fail CI), Exit 2 = warnings only (allow)
          node cli/docguard.mjs guard || [ $? -eq 2 ]

      - name: Score
        run: node cli/docguard.mjs score

      - name: Score JSON
        run: node cli/docguard.mjs score --format json

      - name: Diff
        run: node cli/docguard.mjs diff

      - name: Badge
        run: node cli/docguard.mjs badge

      - name: Diagnose
        run: node cli/docguard.mjs diagnose

      # ── Cross-project tests ──
      - name: Init in temp dir
        run: |
          mkdir -p /tmp/docguard-test
          node cli/docguard.mjs init --dir /tmp/docguard-test --force

      - name: Guard after init (exit 2 = warnings OK for empty projects)
        run: |
          node cli/docguard.mjs guard --dir /tmp/docguard-test || [ $? -eq 2 ]

      - name: Generate in empty dir
        run: |
          mkdir -p /tmp/docguard-gen
          node cli/docguard.mjs generate --dir /tmp/docguard-gen

      - name: Generate --force
        run: node cli/docguard.mjs generate --dir /tmp/docguard-gen --force

      - name: Agents
        run: node cli/docguard.mjs agents --dir /tmp/docguard-test

      - name: Hooks --list
        run: node cli/docguard.mjs hooks --list

  # ── npm publish dry-run on tags ──
  publish-check:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
      - name: Publish dry-run
        run: npm publish --dry-run
