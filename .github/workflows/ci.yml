name: SpecGuard CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full git history for freshness validator

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      # ── Automated Test Suite ──
      - name: Run Tests
        run: npm test

      # ── Self-validation (dogfooding) ──
      - name: CLI Version
        run: node cli/specguard.mjs --version

      - name: Audit
        run: node cli/specguard.mjs audit

      - name: Guard (self-check)
        run: node cli/specguard.mjs guard

      - name: Score
        run: node cli/specguard.mjs score

      - name: Score JSON
        run: node cli/specguard.mjs score --format json

      - name: Diff
        run: node cli/specguard.mjs diff

      - name: Badge
        run: node cli/specguard.mjs badge

      # ── Cross-project tests ──
      - name: Init in temp dir
        run: |
          mkdir -p /tmp/specguard-test
          node cli/specguard.mjs init --dir /tmp/specguard-test

      - name: Audit after init
        run: node cli/specguard.mjs audit --dir /tmp/specguard-test

      - name: Generate in empty dir
        run: |
          mkdir -p /tmp/specguard-gen
          node cli/specguard.mjs generate --dir /tmp/specguard-gen

      - name: Generate --force
        run: node cli/specguard.mjs generate --dir /tmp/specguard-gen --force

      - name: Agents
        run: node cli/specguard.mjs agents --dir /tmp/specguard-test

      - name: Hooks --list
        run: node cli/specguard.mjs hooks --list

  # ── npm publish dry-run on tags ──
  publish-check:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
      - name: Publish dry-run
        run: npm publish --dry-run
